<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — Plataforma de Treinamento em IA</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: var(--bg); }
    .login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; background:linear-gradient(135deg,#1E2D4D 0%,#2B4066 50%,#1E2D4D 100%); }
    .login-page::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 600px 400px at 20% 30%,rgba(46,92,154,0.15) 0%,transparent 70%),radial-gradient(ellipse 500px 500px at 80% 70%,rgba(200,164,92,0.08) 0%,transparent 70%); pointer-events:none; }
    .login-container { position:relative; z-index:2; width:100%; max-width:460px; padding:0 24px; }
    .login-brand { text-align:center; margin-bottom:48px; }
    .login-brand .icon-shield { width:64px; height:64px; margin:0 auto 24px; border:2px solid var(--dourado); border-radius:16px; display:flex; align-items:center; justify-content:center; background:rgba(200,164,92,0.05); transform:rotate(45deg); }
    .login-brand .icon-shield span { transform:rotate(-45deg); font-size:28px; color:var(--dourado); }
    .login-brand h1 { font-family:var(--font-display); font-size:1.95rem; font-weight:700; letter-spacing:-0.02em; line-height:1.3; color:var(--text); }
    .login-brand h1 .gold { color:var(--dourado); }
    .login-brand .subtitle { margin-top:8px; font-size:1.02rem; color:var(--text-secondary); font-weight:300; }
    .login-brand .subtitle-small { margin-top:12px; font-size:0.82rem; color:var(--text-muted); font-weight:300; letter-spacing:0.03em; }
    .login-card { background:var(--bg-elevated); border:1px solid rgba(200,164,92,0.15); border-radius:var(--radius-xl); padding:40px 36px; backdrop-filter:blur(20px); }
    .login-card label { display:block; font-size:0.9rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--dourado); margin-bottom:10px; }
    .login-card input { width:100%; padding:16px 20px; border:1px solid rgba(200,164,92,0.2); border-radius:var(--radius-md); background:rgba(10,22,40,0.6); color:var(--text); font-family:var(--font-body); font-size:1.1rem; transition:all var(--transition-base); outline:none; }
    .login-card input::placeholder { color:rgba(138,154,181,0.5); }
    .login-card input:focus { border-color:var(--dourado); box-shadow:0 0 0 3px var(--dourado-dim); }
    .form-group { margin-bottom:20px; }
    .login-card button { width:100%; margin-top:12px; padding:16px; border:none; border-radius:var(--radius-md); background:linear-gradient(135deg,var(--dourado) 0%,#B8944C 100%); color:var(--bg); font-family:var(--font-body); font-size:1.05rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; transition:all var(--transition-base); }
    .login-card button:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(200,164,92,0.3); }
    .login-card button:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }
    .login-error { margin-top:16px; padding:12px 16px; border-radius:var(--radius-sm); background:rgba(220,60,60,0.1); border:1px solid rgba(220,60,60,0.3); color:#FF8A8A; font-size:0.95rem; text-align:center; display:none; }
    .login-success { margin-top:16px; padding:12px 16px; border-radius:var(--radius-sm); background:rgba(76,175,130,0.1); border:1px solid rgba(76,175,130,0.3); color:#6DD4A0; font-size:0.95rem; text-align:center; display:none; }
    .login-info { margin-top:16px; padding:14px 18px; border-radius:var(--radius-sm); background:rgba(46,92,154,0.15); border:1px solid rgba(46,92,154,0.25); color:var(--text-secondary); font-size:0.92rem; text-align:center; }
    .login-info strong { color:var(--dourado); }
    .forgot-link { display:block; text-align:center; margin-top:20px; color:var(--text-muted); font-size:0.88rem; text-decoration:none; transition:color 0.2s; }
    .forgot-link:hover { color:var(--dourado); }
    .course-list { margin-top:12px; }
    .course-item { padding:14px 18px; margin-bottom:8px; border:1px solid rgba(200,164,92,0.15); border-radius:var(--radius-md); background:rgba(10,22,40,0.4); cursor:pointer; transition:all 0.2s; text-decoration:none; display:block; }
    .course-item:hover { border-color:var(--dourado); background:rgba(200,164,92,0.08); transform:translateY(-1px); }
    .course-item .course-name { font-weight:600; color:var(--text); font-size:1rem; }
    .course-item .course-turma { font-size:0.82rem; color:var(--text-muted); margin-top:4px; }
    @media (max-width:768px) { .login-card { padding:32px 24px; } .login-brand h1 { font-size:1.5rem; } }
  </style>
</head>
<body class="login-page-body">
  <div class="login-page">
    <div class="grid-pattern"></div>
    <div class="login-container">
      <div class="login-brand">
        <div class="icon-shield"><span>🎓</span></div>
        <h1>Plataforma de<br><span class="gold">Treinamento em IA</span></h1>
        <p class="subtitle">Acesse o conteúdo do seu curso</p>
        <p class="subtitle-small" id="loginSubtitle">Informe seu CPF e senha para entrar</p>
      </div>

      <!-- LOGIN -->
      <div class="login-card" id="loginSection">
        <div class="form-group">
          <label for="cpfInput">CPF</label>
          <input type="text" id="cpfInput" placeholder="Digite seu CPF (apenas números)" maxlength="14" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="senhaInput">Senha</label>
          <input type="password" id="senhaInput" placeholder="Digite sua senha">
        </div>
        <div class="login-error" id="loginError"></div>
        <button id="btnLogin">Entrar</button>
        <p style="text-align:center; margin-top:16px; font-size:0.82rem; color:var(--text-muted);">Primeiro acesso? Use seu CPF como senha.</p>
        <a href="#" class="forgot-link" id="forgotLink">Esqueci minha senha</a>
      </div>

      <!-- TROCA DE SENHA -->
      <div class="login-card" id="changePasswordSection" style="display:none;">
        <div class="login-info" style="margin-top:0; margin-bottom:20px;">
          Este é seu <strong>primeiro acesso</strong>. Por favor, defina uma nova senha.
        </div>
        <div class="form-group">
          <label for="novaSenhaInput">Nova Senha</label>
          <input type="password" id="novaSenhaInput" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label for="confirmaSenhaInput">Confirmar Senha</label>
          <input type="password" id="confirmaSenhaInput" placeholder="Repita a nova senha">
        </div>
        <div class="login-error" id="changeError"></div>
        <button id="btnChangePassword">Definir Senha</button>
      </div>

      <!-- ESQUECI SENHA -->
      <div class="login-card" id="forgotSection" style="display:none;">
        <div class="form-group">
          <label for="forgotCpfInput">CPF</label>
          <input type="text" id="forgotCpfInput" placeholder="Digite seu CPF" maxlength="14" autocomplete="off">
        </div>
        <div class="login-error" id="forgotError"></div>
        <div class="login-success" id="forgotSuccess"></div>
        <button id="btnForgot">Enviar link de recuperação</button>
        <a href="#" class="forgot-link" id="backToLogin">Voltar ao login</a>
      </div>

      <!-- SELETOR DE CURSO -->
      <div class="login-card" id="courseSection" style="display:none;">
        <div class="login-info" style="margin-top:0; margin-bottom:16px;">
          Bem-vindo(a), <strong id="welcomeName"></strong>! Selecione o curso:
        </div>
        <div class="course-list" id="courseList"></div>
      </div>
    </div>
  </div>

  <script>
  const SUPABASE_URL = 'https://hlfndpjmkpnwxiackvce.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZm5kcGpta3Bud3hpYWNrdmNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzQ5NDYsImV4cCI6MjA4ODMxMDk0Nn0.1TbQdqG78Ohnc7kBp4VXdLuhOkMuwfB27EJAYCdhIWc';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUsuario = null;

  function getTreinamentoRoot() {
    const m = window.location.pathname.match(/(.*\/treinamento\/)/);
    return m ? m[1] : '/treinamento/';
  }
  function cleanCpf(v) { return v.replace(/\D/g, ''); }
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 6000);
  }
  function showSection(id) {
    ['loginSection','changePasswordSection','forgotSection','courseSection'].forEach(s =>
      document.getElementById(s).style.display = s === id ? 'block' : 'none');
  }

  // === LOGIN ===
  document.getElementById('btnLogin').addEventListener('click', handleLogin);
  document.getElementById('senhaInput').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
  document.getElementById('cpfInput').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('senhaInput').focus(); });

  async function handleLogin() {
    const cpf = cleanCpf(document.getElementById('cpfInput').value);
    const senha = document.getElementById('senhaInput').value;
    if (!cpf || cpf.length !== 11) { showError('loginError', 'Informe um CPF válido (11 dígitos).'); return; }
    if (!senha) { showError('loginError', 'Informe sua senha.'); return; }

    const { data: usuarios, error: findErr } = await sb.rpc('buscar_usuario_por_cpf', { p_cpf: cpf });
    const usuario = usuarios && usuarios.length > 0 ? usuarios[0] : null;
    if (findErr || !usuario) { showError('loginError', 'CPF não encontrado no sistema.'); return; }
    if (!usuario.ativo) { showError('loginError', 'Seu acesso está desativado. Procure o administrador.'); return; }

    const { error: authErr } = await sb.auth.signInWithPassword({ email: usuario.email, password: senha });
    if (authErr) { showError('loginError', 'Senha incorreta.'); return; }

    currentUsuario = usuario;

    if (usuario.primeiro_acesso) {
      showSection('changePasswordSection');
      document.getElementById('loginSubtitle').textContent = 'Defina sua nova senha';
      document.getElementById('novaSenhaInput').focus();
      return;
    }
    await recordAccessAndRedirect();
  }

  // === TROCA DE SENHA ===
  document.getElementById('btnChangePassword').addEventListener('click', handleChangePassword);
  document.getElementById('confirmaSenhaInput').addEventListener('keypress', e => { if (e.key === 'Enter') handleChangePassword(); });

  async function handleChangePassword() {
    const nova = document.getElementById('novaSenhaInput').value;
    const confirma = document.getElementById('confirmaSenhaInput').value;
    if (!nova || nova.length < 6) { showError('changeError', 'A senha deve ter no mínimo 6 caracteres.'); return; }
    if (nova !== confirma) { showError('changeError', 'As senhas não coincidem.'); return; }

    const { error } = await sb.auth.updateUser({ password: nova });
    if (error) { showError('changeError', 'Erro ao alterar senha: ' + error.message); return; }

    await sb.rpc('marcar_acesso_realizado', { p_user_id: currentUsuario.cd_usuario });
    currentUsuario.primeiro_acesso = false;
    await recordAccessAndRedirect();
  }

  // === ESQUECI SENHA ===
  document.getElementById('forgotLink').addEventListener('click', e => {
    e.preventDefault(); showSection('forgotSection');
    document.getElementById('loginSubtitle').textContent = 'Recuperação de senha';
    document.getElementById('forgotCpfInput').focus();
  });
  document.getElementById('backToLogin').addEventListener('click', e => {
    e.preventDefault(); showSection('loginSection');
    document.getElementById('loginSubtitle').textContent = 'Informe seu CPF e senha para entrar';
    document.getElementById('cpfInput').focus();
  });
  document.getElementById('btnForgot').addEventListener('click', async () => {
    const cpf = cleanCpf(document.getElementById('forgotCpfInput').value);
    if (!cpf || cpf.length !== 11) { showError('forgotError', 'Informe um CPF válido (11 dígitos).'); return; }
    const { data: usuarios } = await sb.rpc('buscar_usuario_por_cpf', { p_cpf: cpf });
    const usuario = usuarios && usuarios.length > 0 ? usuarios[0] : null;
    if (!usuario) { showError('forgotError', 'CPF não encontrado no sistema.'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(usuario.email, {
      redirectTo: window.location.origin + getTreinamentoRoot() + 'login.html'
    });
    if (error) { showError('forgotError', 'Erro ao enviar e-mail: ' + error.message); return; }
    const s = document.getElementById('forgotSuccess');
    s.textContent = 'Link de recuperação enviado para ' + usuario.email + '. Verifique sua caixa de entrada.';
    s.style.display = 'block';
  });

  // === ACESSO E REDIRECIONAMENTO ===
  async function recordAccessAndRedirect() {
    await sb.rpc('registrar_acesso', { p_user_id: currentUsuario.cd_usuario });

    const { data: acessos, error } = await sb.rpc('verificar_acesso', { p_user_id: currentUsuario.cd_usuario });
    if (error || !acessos || acessos.length === 0) {
      showSection('loginSection');
      showError('loginError', 'Você não possui acesso a nenhum curso ativo no momento. Procure o administrador.');
      await sb.auth.signOut(); return;
    }

    const root = getTreinamentoRoot();

    // Agrupar por curso (pode ter múltiplas turmas no mesmo curso)
    const cursoMap = {};
    acessos.forEach(a => {
      if (!cursoMap[a.subpasta]) cursoMap[a.subpasta] = { curso: a.curso, subpasta: a.subpasta, turmas: [] };
      cursoMap[a.subpasta].turmas.push(a);
    });
    const cursosUnicos = Object.values(cursoMap);

    if (cursosUnicos.length === 1) {
      const c = cursosUnicos[0];
      sessionStorage.setItem('treinamento_turma', c.turmas[0].turma);
      sessionStorage.setItem('treinamento_subpasta', c.subpasta);
      sessionStorage.setItem('treinamento_curso', c.curso);
      sessionStorage.setItem('treinamento_auth_time', Date.now().toString());
      sessionStorage.setItem('treinamento_user_id', currentUsuario.cd_usuario);
      sessionStorage.setItem('treinamento_user_name', currentUsuario.nome);
      window.location.href = root + c.subpasta + '/index.html';
    } else {
      document.getElementById('welcomeName').textContent = currentUsuario.nome;
      document.getElementById('loginSubtitle').textContent = 'Selecione o curso';
      document.getElementById('courseList').innerHTML = cursosUnicos.map(c => {
        const turmaNames = c.turmas.map(t => t.nome_turma || t.turma).join(', ');
        return '<a class="course-item" href="#" onclick="selectCourse(\'' + c.subpasta + '\',\'' + c.turmas[0].turma + '\',\'' + c.curso.replace(/'/g, "\\'") + '\'); return false;">'
          + '<div class="course-name">' + c.curso + '</div>'
          + '<div class="course-turma">' + turmaNames + '</div></a>';
      }).join('');
      showSection('courseSection');
    }
  }

  window.selectCourse = function(subpasta, turma, curso) {
    const root = getTreinamentoRoot();
    sessionStorage.setItem('treinamento_turma', turma);
    sessionStorage.setItem('treinamento_subpasta', subpasta);
    sessionStorage.setItem('treinamento_curso', curso);
    sessionStorage.setItem('treinamento_auth_time', Date.now().toString());
    sessionStorage.setItem('treinamento_user_id', currentUsuario.cd_usuario);
    sessionStorage.setItem('treinamento_user_name', currentUsuario.nome);
    window.location.href = root + subpasta + '/index.html';
  };

  // === SESSÃO EXISTENTE ===
  async function checkExistingSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const userId = sessionStorage.getItem('treinamento_user_id');
    const subpasta = sessionStorage.getItem('treinamento_subpasta');
    if (userId && subpasta) {
      window.location.href = getTreinamentoRoot() + subpasta + '/index.html';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    checkExistingSession();
    document.getElementById('cpfInput').focus();
  });
  </script>
</body>
</html>
